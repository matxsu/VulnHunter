# version: "3.9" (obsolete, removing)

services:

  # ── VulnHunter Scanner ──────────────────────────────────────────
  vulnhunter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulnhunter
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=info
    volumes:
      - reports:/app/reports
    networks:
      - scanner-net
    depends_on:
      - dvwa
    restart: unless-stopped

  # ── DVWA — Damn Vulnerable Web Application ──────────────────────
  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    ports:
      - "8080:80"
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
    networks:
      - scanner-net
    # (healthcheck removed because curl is missing in this image)
    restart: unless-stopped

  # ── OWASP Juice Shop ────────────────────────────────────────────
  juiceshop:
    image: bkimminich/juice-shop:latest
    container_name: juiceshop
    ports:
      - "3000:3000"
    networks:
      - scanner-net
    restart: unless-stopped

networks:
  scanner-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  reports:
